name: qikuku

services:
  app:
    image: ${QIKUKU_IMAGE:?QIKUKU_IMAGE is required}
    pull_policy: never
    env_file:
      - ${QIKUKU_ENV_FILE:?QIKUKU_ENV_FILE is required}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_REQUIRE_POSTGRES: 'true'
    ports:
      - '127.0.0.1:${QIKUKU_APP_PORT:-3000}:3000'
    volumes:
      - ${DATABASE_SSL_CA_HOST_PATH:?DATABASE_SSL_CA_HOST_PATH is required}:/run/secrets/tencentdb-ca.pem:ro
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    logging:
      driver: local
      options:
        max-size: 20m
        max-file: '5'
    cpus: '3.0'
    mem_limit: 4g
    pids_limit: 256
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/api/health/live').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  migrate:
    # A separately imported migrator image is required before this profile can
    # be used. The safe placeholder cannot be pulled because pull_policy is
    # never, and is deliberately not prepared in this deployment phase.
    image: ${QIKUKU_MIGRATOR_IMAGE:-qikuku-migrator:unavailable}
    pull_policy: never
    profiles: ['tools']
    environment:
      NODE_ENV: production
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL:?DATABASE_DIRECT_URL is required for migrate}
      DATABASE_SSL_CA_PATH: /run/secrets/tencentdb-ca.pem
      DATABASE_PRIVATE_HOSTS: ${DATABASE_PRIVATE_HOSTS:-}
    volumes:
      - ${DATABASE_SSL_CA_HOST_PATH:?DATABASE_SSL_CA_HOST_PATH is required}:/run/secrets/tencentdb-ca.pem:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: 'no'
    logging:
      driver: local
      options:
        max-size: 20m
        max-file: '5'
